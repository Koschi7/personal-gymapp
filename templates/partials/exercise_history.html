<div class="ex-history">
    <div class="ex-history-head">
        <h3 class="ex-history-title">{{ name }}</h3>
        <button class="icon-btn" onclick="document.getElementById('exercise-history-modal').innerHTML=''" aria-label="Schließen">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
        </button>
    </div>

    {% if history|length > 1 %}
    <div class="ex-history-chart-box">
        <canvas id="exercise-chart"></canvas>
    </div>
    <script>
    (function() {
        const canvas = document.getElementById('exercise-chart');
        const ctx = canvas.getContext('2d');
        const h = canvas.parentElement.clientHeight || 200;
        const grad = ctx.createLinearGradient(0, 0, 0, h);
        grad.addColorStop(0, 'rgba(10, 132, 255, 0.22)');
        grad.addColorStop(1, 'rgba(10, 132, 255, 0)');

        new Chart(ctx, {
            type: 'line',
            data: {
                labels: [{% for h in history %}'{{ h.date_fmt }}'{% if not loop.last %},{% endif %}{% endfor %}],
                datasets: [{
                    label: 'Max kg',
                    data: [{% for h in history %}{{ h.max_weight }}{% if not loop.last %},{% endif %}{% endfor %}],
                    borderColor: '#0A84FF',
                    backgroundColor: grad,
                    fill: true,
                    tension: 0.35,
                    borderWidth: 2,
                    pointRadius: 0,
                    pointHoverRadius: 5,
                    pointHoverBackgroundColor: '#0A84FF',
                    pointHoverBorderColor: '#fff',
                    pointHoverBorderWidth: 2,
                }, {
                    label: 'Volumen',
                    data: [{% for h in history %}{{ h.volume }}{% if not loop.last %},{% endif %}{% endfor %}],
                    borderColor: '#30D158',
                    borderDash: [3, 4],
                    backgroundColor: 'transparent',
                    fill: false,
                    tension: 0.35,
                    borderWidth: 1.5,
                    pointRadius: 0,
                    pointHoverRadius: 4,
                    pointHoverBackgroundColor: '#30D158',
                    yAxisID: 'y1',
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                interaction: { mode: 'index', intersect: false },
                plugins: {
                    legend: {
                        labels: {
                            color: '#8E8E93',
                            font: { size: 11, family: 'ui-rounded, -apple-system, system-ui' },
                            boxWidth: 8,
                            boxHeight: 8,
                            usePointStyle: true,
                            pointStyle: 'circle'
                        }
                    },
                    tooltip: {
                        backgroundColor: 'rgba(28, 28, 30, 0.96)',
                        titleColor: '#fff',
                        bodyColor: '#fff',
                        borderColor: 'rgba(255,255,255,0.08)',
                        borderWidth: 1,
                        padding: 10,
                        cornerRadius: 10,
                        displayColors: true,
                        boxPadding: 4
                    }
                },
                scales: {
                    x: {
                        ticks: { color: '#8E8E93', font: { size: 10 }, maxRotation: 0, autoSkipPadding: 20 },
                        grid: { display: false },
                        border: { display: false }
                    },
                    y: {
                        position: 'right',
                        ticks: { color: '#8E8E93', font: { size: 10 }, padding: 6 },
                        grid: { color: 'rgba(255,255,255,0.04)' },
                        border: { display: false }
                    },
                    y1: {
                        position: 'left',
                        display: false
                    }
                }
            }
        });
    })();
    </script>
    {% endif %}

    <div class="ex-history-list">
        {% for h in history|reverse %}
        <div class="ex-set">
            <span class="ex-set-idx" style="min-width: 0; color: var(--text-2); font-size: 12px; letter-spacing: 0;">{{ h.date_fmt }}</span>
            <span class="ex-set-val" style="flex:1; text-align: right;">
                <span>{{ h.max_weight }}</span><span class="unit">kg</span>
                <span class="times">·</span>
                <span>{{ h.sets }}</span><span class="unit">Sätze</span>
                <span class="times">·</span>
                <span>{{ h.total_reps }}</span><span class="unit">Wdh</span>
            </span>
        </div>
        {% endfor %}
    </div>
</div>
