<div class="card">
    {% if saved is defined and saved %}
    <div class="toast">Gespeichert.</div>
    {% endif %}

    <form hx-post="/profile" hx-target="#profile-form-wrap" hx-swap="innerHTML" hx-encoding="multipart/form-data">
        <div class="profile-avatar-wrap">
            {% if profile.picture %}
            <img src="/uploads/{{ profile.picture }}" alt="" class="avatar avatar-xl" id="avatar-preview">
            {% else %}
            <div class="avatar avatar-xl avatar-placeholder" id="avatar-preview">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="8" r="4"/><path d="M4 21v-1c0-3.3 3.6-6 8-6s8 2.7 8 6v1"/>
                </svg>
            </div>
            {% endif %}
            <label class="btn btn-sm btn-ghost avatar-btn">
                Foto ändern
                <input type="file" name="picture" accept="image/*" hidden onchange="previewAvatar(this)">
            </label>
        </div>

        <div class="field">
            <label class="field-label">Name</label>
            <input type="text" name="name" value="{{ profile.name }}" class="input" placeholder="Dein Name">
        </div>

        <div class="field">
            <label class="field-label">Körpergewicht</label>
            <input type="number" name="current_weight" value="{{ current_weight if current_weight else '' }}" class="input" placeholder="kg" step="0.1" min="30" max="300" inputmode="decimal">
            <span class="field-hint">Wird auch unter „Gewicht" gespeichert.</span>
        </div>

        <div class="field">
            <label class="field-label">Trainingstage pro Woche</label>
            <input type="number" name="goal_days_week" value="{{ profile.goal_days_week }}" class="input" min="1" max="7" inputmode="numeric">
            <span class="field-hint">Monatliches Ziel: {{ profile.goal_days_month }} Tage</span>
        </div>

        <button type="submit" class="btn btn-full">Speichern</button>
    </form>
</div>

<script>
function previewAvatar(input) {
    if (input.files && input.files[0]) {
        const reader = new FileReader();
        reader.onload = function(e) {
            const preview = document.getElementById('avatar-preview');
            if (preview.tagName === 'IMG') {
                preview.src = e.target.result;
            } else {
                const img = document.createElement('img');
                img.src = e.target.result;
                img.className = 'avatar avatar-xl';
                img.id = 'avatar-preview';
                preview.replaceWith(img);
            }
        };
        reader.readAsDataURL(input.files[0]);
    }
}
</script>
