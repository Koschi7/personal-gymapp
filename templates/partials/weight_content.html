{% if history %}
<div class="card">
    {% if history %}
    <div class="weight-current">
        <span class="weight-value">{{ history[0].weight }}</span>
        <span class="weight-unit">kg</span>
    </div>
    {% endif %}
    <canvas id="weightChart" height="200"></canvas>
</div>

<div class="card">
    <div class="card-label">Verlauf</div>
    {% for entry in history %}
    <div class="exercise-row">
        <div class="exercise-info">
            <span class="exercise-name">{{ entry.date_fmt }}</span>
            <span class="exercise-detail">{{ entry.weight }} kg</span>
        </div>
        <button class="btn-icon-only"
                hx-delete="/weight/{{ entry.id }}"
                hx-target="#weight-content"
                hx-swap="innerHTML"
                hx-confirm="Eintrag löschen?">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="3 6 5 6 21 6"/>
                <path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/>
            </svg>
        </button>
    </div>
    {% endfor %}
</div>

<script>
document.addEventListener('DOMContentLoaded', initWeightChart);
if (typeof htmx !== 'undefined') {
    document.body.addEventListener('htmx:afterSwap', function(e) {
        if (e.detail.target.id === 'weight-content') initWeightChart();
    });
}

function initWeightChart() {
    const canvas = document.getElementById('weightChart');
    if (!canvas) return;
    if (canvas._chart) canvas._chart.destroy();

    const data = {{ history | reverse | list | tojson }};
    const labels = data.map(d => d.date_fmt);
    const values = data.map(d => d.weight);

    canvas._chart = new Chart(canvas, {
        type: 'line',
        data: {
            labels: labels,
            datasets: [{
                data: values,
                borderColor: '#0A84FF',
                backgroundColor: 'rgba(10, 132, 255, 0.1)',
                fill: true,
                tension: 0.3,
                pointRadius: 4,
                pointBackgroundColor: '#0A84FF',
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: {
                x: {
                    ticks: { color: '#8E8E93', font: { size: 10 }, maxRotation: 45 },
                    grid: { color: 'rgba(255,255,255,0.05)' }
                },
                y: {
                    ticks: { color: '#8E8E93', font: { size: 11 } },
                    grid: { color: 'rgba(255,255,255,0.05)' }
                }
            }
        }
    });
}
</script>
{% else %}
<div class="card card-empty">
    <p>Noch kein Gewicht eingetragen.</p>
</div>
{% endif %}
