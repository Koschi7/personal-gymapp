<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">
    <link rel="manifest" href="/static/manifest.json">
    <link rel="apple-touch-icon" href="/static/icon-192.png">
    <title>GymApp</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://unpkg.com/htmx.org@2.0.4" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js" defer></script>
    {% block head %}{% endblock %}
</head>
<body>
    <main id="content">
        {% block content %}{% endblock %}
    </main>

    <nav class="tab-bar">
        <a href="/" class="tab {% if active == 'dashboard' %}active{% endif %}">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
            </svg>
            <span>Start</span>
        </a>
        <a href="/training" class="tab {% if active == 'training' %}active{% endif %}">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M6.5 6.5h11M4 10h16M6.5 17.5h11M4 14h16"/>
                <rect x="2" y="8" width="2" height="8" rx="1"/>
                <rect x="20" y="8" width="2" height="8" rx="1"/>
            </svg>
            <span>Training</span>
        </a>
        <a href="/weight" class="tab {% if active == 'weight' %}active{% endif %}">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M3 20h18M5 16l4-6 4 4 3-5 3 4"/>
            </svg>
            <span>Gewicht</span>
        </a>
        <a href="/profile" class="tab {% if active == 'profile' %}active{% endif %}">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="8" r="4"/>
                <path d="M20 21a8 8 0 00-16 0"/>
            </svg>
            <span>Profil</span>
        </a>
    </nav>
    <script>
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/static/sw.js');
    }
    </script>
</body>
</html>
